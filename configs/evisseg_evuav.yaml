  lr: 0.001
  k: 3
  t: 5
  max_events_num : 200000 # 700000->200000
  model_save_root:  /home/yoon/jk/EV-UAV/EV-UAV/save_model

TEST:
  vis: False
  eval: True
  roc: True  # Very time-consuming, do not open unless necessary
  pd_detT: 50
  correct_thresh: 0.0001
  save: True
  model_path: /home/yoon/jk/EV-UAV/EV-UAV/save_model/best_iou.pt



