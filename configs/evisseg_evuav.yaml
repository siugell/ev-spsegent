STRUCTURE:
  model_name: evissgnet
  width: 12
  block_residual: True
  block_reps: 2
  use_coords: True

DATA:
  input_channel: 4
  root: /home/yoon/jk/EV-UAV/EV-UAV/dataset
  whole_t: 4000 #ms 8000 -> 4000
  res: [346,260]

TRAIN:
  epochs: 50
  batch_size: 1
